name: Docker CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    outputs:
      image_name: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo "${REPO_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER_LC}/${REPO_LC}-web" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy with Docker Compose
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Check deploy secrets
        id: guard
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REGISTRY_USERNAME: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          DEPLOY_REGISTRY_TOKEN: ${{ secrets.DEPLOY_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          MISSING=0
          for KEY in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH DEPLOY_REGISTRY_USERNAME DEPLOY_REGISTRY_TOKEN; do
            VALUE="${!KEY:-}"
            if [ -z "$VALUE" ]; then
              echo "Missing required secret: $KEY"
              MISSING=1
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.guard.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_NAME: ${{ needs.docker.outputs.image_name }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REGISTRY_USERNAME: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          DEPLOY_REGISTRY_TOKEN: ${{ secrets.DEPLOY_REGISTRY_TOKEN }}
          DEPLOY_ENV_FILE_B64: ${{ secrets.DEPLOY_ENV_FILE_B64 }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          envs: IMAGE_NAME,DEPLOY_PATH,DEPLOY_REGISTRY_USERNAME,DEPLOY_REGISTRY_TOKEN,DEPLOY_ENV_FILE_B64
          script: |
            set -euo pipefail

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if [ -n "${DEPLOY_ENV_FILE_B64:-}" ]; then
              mkdir -p web
              echo "$DEPLOY_ENV_FILE_B64" | base64 -d > web/.env.local
            fi

            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml not found in $DEPLOY_PATH"
              exit 1
            fi

            if [ ! -f docker-compose.prod.yml ]; then
              echo "docker-compose.prod.yml not found in $DEPLOY_PATH"
              exit 1
            fi

            if [ ! -f web/.env.local ]; then
              echo "web/.env.local not found. Set DEPLOY_ENV_FILE_B64 or create the file manually on server."
              exit 1
            fi

            echo "WEB_IMAGE=${IMAGE_NAME}:latest" > .deploy.env

            echo "$DEPLOY_REGISTRY_TOKEN" | docker login ghcr.io -u "$DEPLOY_REGISTRY_USERNAME" --password-stdin

            docker compose \
              --env-file .deploy.env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull web

            docker compose \
              --env-file .deploy.env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --remove-orphans --force-recreate web

            docker image prune -af --filter "until=168h" || true

      - name: Skip deploy (missing secrets)
        if: steps.guard.outputs.ready != 'true'
        run: echo "Deploy skipped because required deploy secrets are not fully configured."
