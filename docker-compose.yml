services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./web/.env.local
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      MONGODB_URI: mongodb://mongo:27017/hackstrom
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GOOGLE_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
    ports:
      - "3000:3000"

volumes:
  mongo-data:
  redis-data:
